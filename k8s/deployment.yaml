apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-app-processa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minha-app-processa
  template:
    metadata:
      labels:
        app: minha-app-processa
    spec:
      tolerations:
        - key: "microservice"
          operator: "Equal"
          value: "processa"
          effect: "NoSchedule"
      containers:
        - name: minha-app-processa
          image: IMAGEM_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-key
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_S3_BUCKET  # <-- Esta é a nova variável
              value: "ht-recebe-video"
            - name: AWS_SQS_URL  # <-- Nova variável para a fila
              value: "https://sqs.us-east-1.amazonaws.com/579375260812/fila-processamento-videos"
            - name: AWS_SNS_URL  # <-- Nova variável para a fila
              value: "https://sqs.us-east-1.amazonaws.com/579375260812/fila-notifica-videos"
            - name: AWS_SQS_RESULT_URL  # <-- Nova variável para a fila
              value: "https://sqs.us-east-1.amazonaws.com/579375260812/fila-resulta-video"
            - name: AWS_DYNAMODB_TABLE  # <-- Adicione esta linha
              value: "Pedidos"
