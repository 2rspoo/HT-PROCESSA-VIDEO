name: SonarCloud Analysis
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build:
    name: Build and analyze (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial para o Sonar detectar quem escreveu cada linha de código

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Distribuição recomendada para estabilidade
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Substitua '2rspoo' e '2rspoo_HT-PROCESSA-VIDEO' pelos valores exatos do seu painel SonarCloud
        run: >
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar 
          -Dsonar.projectKey=2rspoo_HT-PROCESSA-VIDEO 
          -Dsonar.organization=2rspoo 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.java.binaries=target/classes